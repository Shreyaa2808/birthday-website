<!DOCTYPE html>
<html lang="en">

<body style="
background:black;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
">

<button id="playBtn" style="
padding:15px 30px;
font-size:18px;
border:none;
border-radius:12px;
cursor:pointer;
">
🎵 Start Music
</button>

<audio id="music" loop>
  <source src="song.mp3" type="audio/mp3">
</audio>

<script>

const music =
document.getElementById("music");

const btn =
document.getElementById("playBtn");

btn.onclick = () => {

  music.play();

  music.volume = 0.5;

  btn.innerHTML = "Music Playing 🎶";

}

</script>

</body>
</html>
