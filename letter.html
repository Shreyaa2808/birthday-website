<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>A Letter To Papa</title>

  <!-- GOOGLE FONTS -->

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <!-- Heading -->

  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet">

  <!-- Body -->

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

  <!-- Handwriting -->

  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@500;700&display=swap" rel="stylesheet">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      background:#0f0f0f;
      font-family:'Poppins',sans-serif;
      overflow-x:hidden;
      color:white;
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:40px 20px;
      position:relative;
    }

    /* GOLD GLOW */

    body::before{
      content:'';
      position:fixed;
      width:500px;
      height:500px;
      background:rgba(212,175,55,0.05);
      border-radius:50%;
      filter:blur(120px);
      top:-120px;
      right:-120px;
      z-index:-1;
    }

    /* ENVELOPE CONTAINER */

    .container{
      width:100%;
      max-width:900px;
      position:relative;
    }

    /* ENVELOPE */

    .envelope{
      width:100%;
      height:220px;
      background:#d4af37;
      position:relative;
      border-radius:10px;
      cursor:pointer;
      overflow:hidden;
      box-shadow:0 0 40px rgba(212,175,55,0.2);
    }

    /* TOP FLAP */

    .flap{
      position:absolute;
      width:100%;
      height:100%;
      background:#c19b2e;
      clip-path:polygon(0 0,50% 55%,100% 0);
      transform-origin:top;
      transition:1s ease;
      z-index:5;
    }

    /* LETTER */

    .letter{
      position:relative;
      width:90%;
      margin:auto;
      background:#f5f0e6;
      color:#222;
      padding:60px 50px;
      border-radius:10px;
      margin-top:-40px;

      transform:translateY(200px);
      opacity:0;

      transition:1.2s ease;

      box-shadow:0 20px 40px rgba(0,0,0,0.4);

      background-image:
      linear-gradient(rgba(0,0,0,0.03) 1px, transparent 1px);

      background-size:100% 42px;
    }

    /* OPEN EFFECT */

    .container.open .flap{
      transform:rotateX(180deg);
    }

    .container.open .letter{
      transform:translateY(-20px);
      opacity:1;
    }
.music-btn{
  position:fixed;
  bottom:20px;
  right:20px;
  width:55px;
  height:55px;
  border:none;
  border-radius:50%;
  background:#d4af37;
  color:black;
  font-size:22px;
  cursor:pointer;
  box-shadow:0 0 20px rgba(212,175,55,0.5);
  z-index:999;
}
    /* HEADING */

    .letter h1{
      text-align:center;
      font-family:'Cinzel',serif;
      font-size:48px;
      margin-bottom:40px;
      color:#111;
    }

    /* LETTER TEXT */

    .typing-text{
      font-size:20px;
      line-height:2.3;
      white-space:pre-wrap;
      overflow:hidden;
      font-family:'Dancing Script',cursive;
    }
    body{
  transition:0.8s ease;
}.next-btn{

  margin:80px auto 20px;

  display:block;

  padding:15px 45px;

  border:none;

  border-radius:40px;

  background:
  linear-gradient(to right,#d4af37,#f5d36a);

  color:#111;

  font-size:16px;

  font-weight:600;

  cursor:pointer;

  transition:0.4s ease;

  box-shadow:
  0 0 20px rgba(212,175,55,0.2);

}

.next-btn:hover{

  transform:scale(1.05);

  box-shadow:
  0 0 30px rgba(212,175,55,0.5);

}

    /* SIGNATURE */

    .signature{
      margin-top:60px;
      text-align:right;
      font-size:30px;
      font-family:'Dancing Script',cursive;
    }

    /* TAP TEXT */

    .tap-text{
      text-align:center;
      margin-top:20px;
      color:#cfcfcf;
      letter-spacing:2px;
      font-size:14px;
    }

    /* MOBILE */

    @media(max-width:768px){

      .letter{
        padding:40px 25px;
      }

      .letter h1{
        font-size:34px;
      }

      .typing-text{
        font-size:16px;
        line-height:2;
      }

      .signature{
        font-size:24px;
      }

    }

  </style>

</head>

<body>

  <div class="container" id="container">

    <!-- ENVELOPE -->

    <div class="envelope" onclick="openLetter()">

      <div class="flap"></div>

    </div>

    <div class="tap-text">
      Tap The Envelope
    </div>

    <!-- LETTER -->

    <div class="letter">

      <h1>To Papa</h1>

      <div class="typing-text" id="typing"></div>

      <div class="signature">
        With Love Abhay & Shreya ❤️
      </div>

    </div>

  </div>
<button class="next-btn" onclick="nextPage()">
  Continue
</button>
  <script>

    const text = `Dear Papa,

Thank you for being my biggest support, my protector and my safest place.
No matter how difficult life became, your presence always made everything feel easier.
Thank you for every sacrifice you made quietly without expecting anything in return.
Thank you for every lesson, every smile and every moment you gave our family.
Some of my happiest memories exist because of you.
I may not say it enough, but I truly admire the person you are.
You are the strength of this family and the reason behind so many smiles.
I hope this small surprise reminds you how deeply loved you are.
Also forgive us if anything we said ever hurt you.

Happy Birthday!`;

    let i = 0;

    function openLetter(){

      document.getElementById("container").classList.add("open");

      typeLetter();

    }

    function typeLetter(){

      if(i < text.length){

        document.getElementById("typing").innerHTML += text.charAt(i);

        i++;

        setTimeout(typeLetter,35);

      }

    }

  </script>
<script>

function nextPage(){

  document.body.style.opacity = "0";

  setTimeout(() => {

    window.location.href = "dadwrapped.html";

  },700);

}

</script>
<audio id="bg-music" loop>
  <source src="birthday-song.mp3" type="audio/mp3">
</audio>

<button class="music-btn" onclick="toggleMusic()">🎵</button>

<script>
const music = document.getElementById("bg-music");

const savedTime = localStorage.getItem("music-time");

music.currentTime = savedTime ? parseFloat(savedTime) : 0;

window.addEventListener("click", () => {
    music.play();
}, { once: true });

setInterval(() => {
    localStorage.setItem("music-time", music.currentTime);
}, 1000);

function toggleMusic() {
    if (music.paused) {
        music.play();
    } else {
        music.pause();
    }
}
</script>
</body>

</html>
