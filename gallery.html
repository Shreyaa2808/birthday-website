<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Beautiful Memories</title>

  <!-- GOOGLE FONTS -->

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet">

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }
   body{
  transition:0.8s ease;
}.next-btn{

  margin:80px auto 20px;

  display:block;

  padding:15px 45px;

  border:none;

  border-radius:40px;

  background:
  linear-gradient(to right,#d4af37,#f5d36a);

  color:#111;

  font-size:16px;

  font-weight:600;

  cursor:pointer;

  transition:0.4s ease;

  box-shadow:
  0 0 20px rgba(212,175,55,0.2);

}

.next-btn:hover{

  transform:scale(1.05);

  box-shadow:
  0 0 30px rgba(212,175,55,0.5);

}
    body{
      background:#0f0f0f;
      font-family:'Poppins',sans-serif;
      overflow-x:hidden;
      color:white;
      min-height:100vh;
      padding:80px 20px;
      position:relative;
    }

    /* GOLD GLOW */

    body::before{
      content:'';
      position:fixed;
      width:500px;
      height:500px;
      background:rgba(212,175,55,0.05);
      border-radius:50%;
      filter:blur(120px);
      top:-150px;
      right:-150px;
      z-index:-1;
    }

    /* HEADER */

    .header{
      text-align:center;
      margin-bottom:80px;
    }

    .header h1{
      font-family:'Cinzel',serif;
      font-size:60px;
      margin-bottom:20px;
    }

    .header p{
      color:#c5c5c5;
      font-size:18px;
    }

    /* GALLERY */

    .gallery{
      max-width:1400px;
      margin:auto;

      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
      gap:40px;
    }

    /* POLAROID */

    .polaroid{
      background:white;
      padding:15px 15px 60px;
      border-radius:6px;
      position:relative;

      transform:rotate(var(--rotate));
      transition:0.5s ease;

      box-shadow:
      0 10px 30px rgba(0,0,0,0.4);
    }

    .polaroid:hover{
      transform:
      rotate(0deg)
      scale(1.04);

      z-index:10;
    }

    /* IMAGE */

    .polaroid img{
      width:100%;
      height:280px;
      object-fit:cover;
      display:block;
      filter:grayscale(20%);
      transition:0.5s ease;
    }

    .polaroid:hover img{
      filter:grayscale(0%);
    }
.music-btn{
  position:fixed;
  bottom:20px;
  right:20px;
  width:55px;
  height:55px;
  border:none;
  border-radius:50%;
  background:#d4af37;
  color:black;
  font-size:22px;
  cursor:pointer;
  box-shadow:0 0 20px rgba(212,175,55,0.5);
  z-index:999;
}
    /* CAPTION */

    .caption{
      position:absolute;
      bottom:18px;
      width:100%;
      left:0;

      text-align:center;

      color:#222;

      font-size:16px;
      font-weight:500;

      font-family:'Poppins',sans-serif;
    }

    /* RANDOM ROTATIONS */

    .r1{
      --rotate:-4deg;
    }

    .r2{
      --rotate:3deg;
    }

    .r3{
      --rotate:-2deg;
    }

    .r4{
      --rotate:5deg;
    }

    .r5{
      --rotate:-5deg;
    }

    .r6{
      --rotate:2deg;
    }

    /* MOBILE */

    @media(max-width:768px){

      body{
        padding:60px 18px;
      }

      .header h1{
        font-size:40px;
      }

      .header p{
        font-size:15px;
      }

      .polaroid img{
        height:260px;
      }

    }

  </style>

</head>

<body>

  <!-- HEADER -->

  <section class="header">

    <h1>Beautiful Memories</h1>

    <p>
      Some moments deserve to live forever.
    </p>

  </section>

  <!-- GALLERY -->

  <section class="gallery">

    <!-- PHOTO 1 -->

    <div class="polaroid r1">

      <img src="d.jpeg">

      <div class="caption">
        Endless laughter ❤️
      </div>

    </div>

    <!-- PHOTO 2 -->

    <div class="polaroid r2">

      <img src="b.JPG">

      <div class="caption">
        Family trips forever ✨
      </div>

    </div>

    <!-- PHOTO 3 -->

    <div class="polaroid r3">

      <img src="c.JPG">

      <div class="caption">
        Happy Together ☀️
      </div>

    </div>

    <!-- PHOTO 4 -->

    <div class="polaroid r4">

      <img src="e.JPG">

      <div class="caption">
        Memories we cherish 🤍
      </div>

    </div>

    <!-- PHOTO 5 -->

    <div class="polaroid r5">

      <img src="3.jpg">

      <div class="caption">
        Fatherhood 🫂
      </div>

    </div>

    <!-- PHOTO 6 -->

    <div class="polaroid r6">

      <img src="g.JPG">

      <div class="caption">
        Love beyond words 🌙
      </div>

    </div>

    <!-- PHOTO 7 -->

    <div class="polaroid r2">

      <img src="7.jpeg">

      <div class="caption">
        Hero 😎
      </div>

    </div>
    <!-- PHOTO 8 -->

    <div class="polaroid r3">

      <img src="9.jpeg">

      <div class="caption">
        Stylish 🧑‍⚕️
      </div>

    </div>

  </section>
  <button class="next-btn" onclick="nextPage()">
  Continue
</button>
<script>

function nextPage(){

  document.body.style.opacity = "0";

  setTimeout(() => {

    window.location.href = "letter.html";

  },700);

}

</script>
<audio id="bg-music" loop>
  <source src="birthday-song.mp3" type="audio/mp3">
</audio>

<button class="music-btn" onclick="toggleMusic()">🎵</button>

<script>
const music = document.getElementById("bg-music");

const savedTime = localStorage.getItem("music-time");

music.currentTime = savedTime ? parseFloat(savedTime) : 0;

window.addEventListener("click", () => {
    music.play();
}, { once: true });

setInterval(() => {
    localStorage.setItem("music-time", music.currentTime);
}, 1000);

function toggleMusic() {
    if (music.paused) {
        music.play();
    } else {
        music.pause();
    }
}
</script>
</body>

</html>
