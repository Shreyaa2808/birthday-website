<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Happy Birthday Papa</title>

  <!-- GOOGLE FONTS -->

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet">

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

  <!-- CONFETTI LIBRARY -->

  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      height:100vh;
      overflow:scroll;

      background:
      linear-gradient(to bottom,#050816,#0f172a);

      font-family:'Poppins',sans-serif;

      display:flex;
      justify-content:center;
      align-items:center;

      position:relative;

      color:white;
    }
   body{
  transition:0.8s ease;
}.next-btn{

  margin:80px auto 20px;

  display:block;

  padding:15px 45px;

  border:none;

  border-radius:40px;

  background:
  linear-gradient(to right,#d4af37,#f5d36a);

  color:#111;

  font-size:16px;

  font-weight:600;

  cursor:pointer;

  transition:0.4s ease;

  box-shadow:
  0 0 20px rgba(212,175,55,0.2);

}
.music-btn{
  position:fixed;
  bottom:20px;
  right:20px;
  width:55px;
  height:55px;
  border:none;
  border-radius:50%;
  background:#d4af37;
  color:black;
  font-size:22px;
  cursor:pointer;
  box-shadow:0 0 20px rgba(212,175,55,0.5);
  z-index:999;
}

.next-btn:hover{

  transform:scale(1.05);

  box-shadow:
  0 0 30px rgba(212,175,55,0.5);

}
    /* STARS */

    .stars{
      position:absolute;
      width:100%;
      height:100%;
      overflow:hidden;
      z-index:0;
    }

    .star{
      position:absolute;
      width:3px;
      height:3px;
      background:white;
      border-radius:50%;

      animation:twinkle 3s infinite ease-in-out;
    }

    @keyframes twinkle{

      0%,100%{
        opacity:0.2;
      }

      50%{
        opacity:1;
      }

    }

    /* CENTER CONTENT */

    .content{
      position:relative;
      z-index:5;
      text-align:center;
      max-width:900px;
      padding:20px;

      animation:fadeIn 2s ease;
    }

    /* FAMILY IMAGE */

    .family-photo{
      width:260px;
      height:260px;

      border-radius:50%;

      object-fit:cover;

      border:4px solid rgba(255,255,255,0.2);

      box-shadow:
      0 0 50px rgba(255,255,255,0.15);

      margin-bottom:40px;

      animation:float 4s ease-in-out infinite;
    }

    /* MAIN HEADING */

    h1{
      font-size:68px;
      font-family:'Cinzel',serif;

      margin-bottom:30px;

      line-height:1.2;

      text-shadow:
      0 0 25px rgba(255,255,255,0.15);
    }

    /* MESSAGE */

    .message{
      font-size:22px;
      line-height:2;
      color:#d7d7d7;

      margin-bottom:40px;
    }

    /* FINAL TEXT */

    .final{
      font-size:28px;
      color:#d4af37;

      font-weight:500;
    }

    /* ANIMATIONS */

    @keyframes fadeIn{

      from{
        opacity:0;
        transform:translateY(40px);
      }

      to{
        opacity:1;
        transform:translateY(0);
      }

    }

    @keyframes float{

      0%,100%{
        transform:translateY(0px);
      }

      50%{
        transform:translateY(-12px);
      }

    }

    /* MOBILE */

    @media(max-width:768px){

      .family-photo{
        width:180px;
        height:180px;
      }

      h1{
        font-size:40px;
      }

      .message{
        font-size:16px;
        line-height:1.8;
      }

      .final{
        font-size:22px;
      }

    }

  </style>

</head>

<body>

  <!-- STARS -->

  <div class="stars" id="stars"></div>

  <!-- MAIN CONTENT -->

  <div class="content">

    <!-- FAMILY PHOTO -->

    <img
      class="family-photo"
      src="papa.jpeg"
      style="margin-top: 200px;"
    >

    <!-- HEADING -->

    <h1>
      Happy Birthday Papa ❤️
    </h1>

    <!-- MESSAGE -->

    <div class="message">

      No matter how old we grow,<br>
      we will always remain the children<br>
      who look up to you with love and pride.<br><br>

      Thank you for every sacrifice,<br>
      every lesson and every moment of love.

    </div>

    <!-- FINAL LINE -->

    <div class="final">

      We love you endlessly.

    </div>

  </div>
  

  <script>

    /* CONFETTI */

    window.onload = () => {

      confetti({
        particleCount:180,
        spread:120,
        origin:{ y:0.6 }
      });

    }

    /* STARS */

    const starsContainer =
    document.getElementById("stars");

    for(let i=0;i<120;i++){

      const star =
      document.createElement("div");

      star.classList.add("star");

      star.style.top =
      Math.random()*100 + "%";

      star.style.left =
      Math.random()*100 + "%";

      star.style.animationDuration =
      (Math.random()*3 + 2) + "s";

      star.style.opacity =
      Math.random();

      starsContainer.appendChild(star);

    }

  </script>
<script>


</script>
<audio id="bg-music" loop>
  <source src="song.mp3" type="audio/mp3">
</audio>

<button class="music-btn" onclick="toggleMusic()">🎵</button>

<script>
const music = document.getElementById("bg-music");

const savedTime = localStorage.getItem("music-time");

music.currentTime = savedTime ? parseFloat(savedTime) : 0;

window.addEventListener("click", () => {
    music.play();
}, { once: true });

setInterval(() => {
    localStorage.setItem("music-time", music.currentTime);
}, 1000);

function toggleMusic() {
    if (music.paused) {
        music.play();
    } else {
        music.pause();
    }
}
</script>
</body>

</html>
